<div id="lightbox" class="lightbox" aria-hidden="true">
  <button class="lightbox-close" type="button" aria-label="Close">&times;</button>
  <img alt="">
</div>
<script>
(function(){
  var lb=document.getElementById('lightbox');if(!lb)return;
  var img=lb.querySelector('img');
  function open(src,alt){img.src=src;img.alt=alt||'';lb.classList.add('is-open');lb.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
  function close(){lb.classList.remove('is-open');lb.setAttribute('aria-hidden','true');img.removeAttribute('src');document.body.style.overflow='';}
  document.addEventListener('click',function(e){
    var a=e.target.closest('a.lightbox-link');
    if(a){e.preventDefault();var im=a.querySelector('img');open(a.getAttribute('href'),im?im.alt:'');return;}
    if(e.target===lb||e.target.closest('.lightbox-close')){close();}
  });
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&lb.classList.contains('is-open'))close();});
})();
</script>
