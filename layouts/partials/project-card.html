{{ $accent := .Params.accent | default "#103D2E" }}
{{ $thumb := "" }}
{{ with .Params.thumb }}{{ with $.Resources.GetMatch . }}{{ $thumb = .RelPermalink }}{{ end }}{{ end }}
<a class="card" href="{{ .RelPermalink }}" style="--accent:{{ $accent }}">
  <span class="card-thumb">{{ with $thumb }}<img src="{{ . }}" alt="{{ $.Title }} preview" loading="lazy">{{ end }}</span>
  <span class="card-meta">
    <strong>{{ .Title }}</strong>
    <em>{{ .Params.subtitle }}</em>
  </span>
</a>
